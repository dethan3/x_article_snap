<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>X Article Snap</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z" fill="currentColor"/>
        </svg>
        <span class="logo-text">X Article Snap</span>
      </div>
      <div id="statusDot" class="status-dot status-idle" title="检测状态"></div>
    </header>

    <div id="notOnX" class="notice" style="display:none;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" fill="currentColor"/></svg>
      <span>请在 X / Twitter 页面使用</span>
    </div>

    <div id="mainPanel">
      <div class="page-info" id="pageInfo">
        <span id="pageTypeTag" class="tag">检测中...</span>
        <span id="pageTitle" class="page-title-text"></span>
      </div>

      <div class="section">
        <div class="section-label">阅读模式</div>
        <div class="btn-group">
          <button id="btnArticleMode" class="btn btn-primary btn-large">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z" fill="currentColor"/></svg>
            切换纯阅读模式
          </button>
        </div>
      </div>

      <div class="section">
        <div class="section-label">截图 & 导出</div>
        <div class="btn-group">
          <button id="btnScreenshot" class="btn btn-accent btn-large">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M20 5h-3.17L15 3H9L7.17 5H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm-8 13c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z" fill="currentColor"/><path d="M12 11c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" fill="currentColor"/></svg>
            高清截图
          </button>
        </div>
      </div>

      <div class="section">
        <div class="section-label">内容提取</div>
        <div class="btn-group">
          <button id="btnMarkdown" class="btn btn-green btn-large">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M20.56 18H3.44C2.65 18 2 17.37 2 16.59V7.41C2 6.63 2.65 6 3.44 6h17.12C21.35 6 22 6.63 22 7.41v9.18c0 .78-.65 1.41-1.44 1.41zM6.81 15.95v-3.81l1.99 2.48 1.99-2.48v3.81h1.99V8.05h-1.99l-1.99 2.48-1.99-2.48H4.82v7.9h1.99zm8.94-3.95H13.76v-3.95h-1.99v3.95h-1.99l2.98 3.95 2.99-3.95z" fill="currentColor"/></svg>
            转 Markdown
          </button>
        </div>
      </div>

      <div class="section">
        <div class="section-label">美化选项</div>
        <div class="options-grid">
          <label class="toggle-row">
            <span>添加水印</span>
            <div class="toggle-wrap">
              <input type="checkbox" id="optWatermark" />
              <span class="toggle-slider"></span>
            </div>
          </label>
          <label class="toggle-row">
            <span>2x 高清</span>
            <div class="toggle-wrap">
              <input type="checkbox" id="optRetina" checked />
              <span class="toggle-slider"></span>
            </div>
          </label>
        </div>
      </div>

      <div id="watermarkRow" class="watermark-input-row" style="display:none;">
        <input type="text" id="watermarkText" placeholder="水印文字..." maxlength="50" />
      </div>
    </div>

    <div id="progressArea" class="progress-area" style="display:none;">
      <div class="progress-bar-wrap">
        <div id="progressBar" class="progress-bar"></div>
      </div>
      <div class="progress-footer">
        <span id="progressText" class="progress-text">准备中...</span>
        <button id="btnCancel" class="btn btn-cancel">取消</button>
      </div>
    </div>

    <div id="toastArea" class="toast-area"></div>

    <footer class="footer">
      <span>X Article Snap</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
